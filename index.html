<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecton Labs</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Dark Mode Design */
        html, body {
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0b0e15;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            position: relative;
        }

        /* Aurora background blobs */
        .aurora {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .aurora::before,
        .aurora::after,
        .aurora span {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(110px);
            opacity: 0.55;
            will-change: transform;
        }

        .aurora::before {
            width: 520px;
            height: 520px;
            background: radial-gradient(circle, #00d4ff 0%, rgba(0, 212, 255, 0) 70%);
            top: -120px;
            left: -140px;
            animation: drift1 20s ease-in-out infinite alternate;
        }

        .aurora::after {
            width: 620px;
            height: 620px;
            background: radial-gradient(circle, #4f5bff 0%, rgba(79, 91, 255, 0) 70%);
            bottom: -180px;
            right: -160px;
            animation: drift2 24s ease-in-out infinite alternate;
        }

        .aurora span {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, #7a4dff 0%, rgba(122, 77, 255, 0) 70%);
            top: 40%;
            left: 55%;
            opacity: 0.35;
            animation: drift3 28s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(180px, 140px) scale(1.1); }
        }

        @keyframes drift2 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-160px, -110px) scale(1.08); }
        }

        @keyframes drift3 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-120px, 100px) scale(1.15); }
        }

        /* Main Card Design */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(18, 22, 33, 0.72);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 40px 36px 32px;
            border-radius: 22px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.22);
            max-width: 440px;
            width: 90%;
        }

        /* Logo */
        .logo {
            width: 260px;
            max-width: 78%;
            height: auto;
            margin-bottom: 0;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* Typography */
        h1 {
            display: none;
        }

        p.subtitle {
            font-size: 1.15rem;
            line-height: 1.4;
            color: #c9ced9;
            margin: 6px 0 0;
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        /* Availability Status */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 22px;
            padding: 7px 14px;
            border-radius: 999px;
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.22);
            font-size: 0.82rem;
            color: #b8bfcc;
            letter-spacing: 0.01em;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px rgba(0, 212, 255, 0.8); }
            50%      { opacity: 0.6; box-shadow: 0 0 4px rgba(0, 212, 255, 0.4); }
        }

        .status-note {
            margin: 10px auto 0;
            font-size: 0.88rem;
            line-height: 1.5;
            color: #6b7280;
            max-width: 340px;
        }

        /* Legal Footer - DO NOT REMOVE */
        footer {
            margin-top: 24px;
            font-size: 11px;
            color: #6b7280;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 16px;
            line-height: 1.5;
        }

        footer p {
            margin: 0;
        }

        /* Entrance */
        .container {
            animation: fadeUp 0.8s ease-out both;
        }

        @keyframes fadeUp {
            0%   { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .aurora::before,
            .aurora::after,
            .aurora span,
            .status-dot,
            .container {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div class="aurora"><span></span></div>
    <div class="container">
        <img src="logo.png" alt="Tecton Labs" class="logo">
        <h1>Tecton Labs</h1>
        <p class="subtitle">Enterprise AI, shipped.</p>

        <div class="status">
            <span class="status-dot"></span>
            <span>Client roster is full</span>
        </div>
        <p class="status-note">Next intake coming soon.</p>

        <footer>
            <p>&copy; 2026 Tecton Labs.</p>
        </footer>
    </div>
</body>
</html>
